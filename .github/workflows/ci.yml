name: Locust Performance SLA Check

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build and start Flask app with Docker
        run: |
          docker build -t flask-app ./app
          docker run -d --name flask-app -p 5000:5000 flask-app
      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 10); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/fast | grep -q 200; then
              echo "App is ready!"
              exit 0
            fi
            echo "Waiting... attempt $i"
            sleep 2
          done
          echo "App did not start. Showing logs:"
          docker logs flask-app
          exit 1
      - name: Run Locust performance test
        id: locust_test
        run: pytest -v --html=reports/pytest_report.html --self-contained-html
      - name: Upload Locust report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: reports/locust_report.html
      - name: Upload Pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest_report.html